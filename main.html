<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="calc-body">
        <div id="display">
          <h1 id="num1"></h1>
          <h1 id="operatorsDisplay"></h1>
          <h1 id="num2"></h1>
        </div>
        <div id="operators">
          <div class="operators2">+</div>
          <div class="operators2">-</div>
          <div class="operators2">x</div>
          <div class="operators2">/</div>
        </div>
        <div id="numb-equal">
          <div id="numb">
            <div class="number-chosen">7</div>
            <div class="number-chosen">8</div>
            <div class="number-chosen">9</div>
            <div class="number-chosen">4</div>
            <div class="number-chosen">5</div>
            <div class="number-chosen">6</div>
            <div class="number-chosen">3</div>
            <div class="number-chosen">2</div>
            <div class="number-chosen">1</div>
            <div class="number-chosen">0</div>
            <div id="dot">.</div>
            <div id="delete">C</div>
          </div>
          <div id="equal">=</div>
        </div>
      </div>
    </div>

    <script src="script/script.js"></script>
  </body>
</html>
